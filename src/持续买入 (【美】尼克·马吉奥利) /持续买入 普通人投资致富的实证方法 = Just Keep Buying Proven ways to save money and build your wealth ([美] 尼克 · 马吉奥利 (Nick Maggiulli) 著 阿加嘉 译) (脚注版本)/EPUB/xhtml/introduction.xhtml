<div id="introduction.xhtml" class="calibre3">
</div><div class="calibre3"><h1 class="calibre4"><span id="sigil_toc_id_1" class="calibre5"><b class="calibre6">如</b><b class="calibre6">何</b><b class="calibre6">使</b><b class="calibre6">用</b><b class="calibre6">这</b><b class="calibre6">本</b><b class="calibre6">书</b></span></h1></div>
<div class="calibre3">
	<p class="calibre7"><span class="calibre10">这本书的结构可以让你最大化利用自己的时间。你可以从头到尾读，但跳到最适合你的章节更有用。</span></p>
	<p class="calibre7"><span class="calibre10">这本书分为储蓄和投资两部分。储蓄部分将包括存钱的方方面面：存多少钱，如何存更多钱，如何没有负罪感地花钱，等等。投资部分将涵盖“钱生钱”的方方面面：为什么应该投资，应该投资什么，投资频率，等等。</span></p>
	<p class="calibre7"><span class="calibre10">我之所以用这样的方式写这本书，是为了让你可以很快地找到自己需要的信息并加以利用。如果你不需要别人帮你省钱，那就跳过那一章。相信我，我不会介意的。我希望你找到一些有价值的东西，而不是一页都不读。</span></p>
	<p class="calibre7"><span class="calibre10">最后，想要快速获得这本书的关键思想和实际用处的人，可以在结语中找到这些信息。</span></p></div>
