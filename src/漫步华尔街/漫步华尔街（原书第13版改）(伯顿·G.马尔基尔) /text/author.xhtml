  <section epub:type="dedication" class="author-card">

    <h2 class="author-name">伯顿·G.马尔基尔(Burton G. Malkiel)</h2>
    <p class="author-bio">伯顿·G.马尔基尔，是普林斯顿大学汉华银行经济学讲座教授。他曾是总统经济顾问委员会成员和耶鲁管理学院院长。他居住在新泽西州。</p>
  </section>

  <!-- 献词卡片 -->

    <p class="dedication-text">
      谨以此书献给爱妻南希和派珀
      <span class="zuixiaoyao_zhushi">㊟</span>
      <span class="zuixiaoyao_zhushi_text">派珀应是作者妻子养的狗之类的宠物。——译者注</span>
    </p>
