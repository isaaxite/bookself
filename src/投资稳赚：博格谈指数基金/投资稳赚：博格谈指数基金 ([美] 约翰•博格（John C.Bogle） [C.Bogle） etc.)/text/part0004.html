<p class="bodycontent">这并不仅仅是一本探讨指数基金的书，它注定可以转变我们对投资的看法和观念。因为一旦你领悟到金融市场的机理，你就会发现，要获得属于你的那份收成，指数基金是唯一的投资方式。</p>
<p class="signcontent"><b class="calibre1">约翰·博格</b></p>
