  <body class="calibre">
<p class="bodycontent-1-c"><b class="calibre1">献给已故的麻省理工学院经济学教授、诺贝尔经济学奖得主和投资大师保罗·萨缪尔森</b></p>
<p class="bodycontent-1-top">1948年，当我就读于普林斯顿大学时，他的经典著作引领我认识了经济学。</p>
<p class="bodycontent">1974年，他的论著再次点燃了我对指数化投资策略的兴趣。</p>
<p class="bodycontent">1976年，他在《新闻周刊》发表的专栏文章，促使我创建了世界上第一个指数型共同基金。</p>
<p class="bodycontent">1993年，他为我的第一本书作序。</p>
<p class="bodycontent">1999年，他再次为我的第二本书作序。</p>
<p class="bodycontent">2009年，他离开了这个世界，但他依然是我的导师，我的灵感之源，我终生的启明灯。</p>
</body></html>
